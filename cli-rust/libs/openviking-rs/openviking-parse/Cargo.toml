[package]
name = "openviking-parse"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Document parsing types and registry for OpenViking"

[lib]
crate-type = ["rlib"]

[dependencies]
openviking-core = { path = "../openviking-core" }
openviking-session = { path = "../openviking-session" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
