[workspace]
resolver = "2"
members = ["openviking-core", "openviking-session", "openviking-vfs", "openviking-queue", "openviking-transaction", "openviking-parse", "openviking-vector", "openviking-ffi"]

[workspace.package]
edition = "2021"
license = "Apache-2.0"
authors = ["UHMS Team"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
