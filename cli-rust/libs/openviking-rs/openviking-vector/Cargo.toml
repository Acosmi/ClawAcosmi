[package]
name = "openviking-vector"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Process-in-memory vector store backed by Qdrant segment library"

[dependencies]
# Qdrant segment engine — process-in-memory vector search
segment = { path = "../../qdrant-engine/lib/segment", default-features = false }
# Shared common utilities from qdrant-engine
# "testing" feature enables ResourcePermit::dummy() and ProgressTracker::new_for_test()
# needed for embedded segment optimization without a full Qdrant resource budget.
common = { path = "../../qdrant-engine/lib/common/common", features = ["testing"] }
# Reuse existing VectorStore trait
openviking-session = { path = "../openviking-session" }
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# UUID for point IDs
uuid = { version = "1", features = ["v4"] }
# Logging
log = "0.4"
# Concurrency
parking_lot = "0.12"
# Async
async-trait = "0.1"
# Random number generation (for SegmentBuilder)
rand = "0.9"
# Temporary directories (for segment optimization)
tempfile = "3"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
