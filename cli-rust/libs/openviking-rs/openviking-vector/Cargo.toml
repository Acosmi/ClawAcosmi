[package]
name = "openviking-vector"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Process-in-memory vector store backed by Qdrant segment library"

[dependencies]
# Qdrant segment engine — process-in-memory vector search
segment = { path = "../../qdrant-engine/lib/segment", default-features = false }
# Shared common utilities from qdrant-engine
common = { path = "../../qdrant-engine/lib/common/common" }
# Reuse existing VectorStore trait
openviking-session = { path = "../openviking-session" }
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# UUID for point IDs
uuid = { version = "1", features = ["v4"] }
# Logging
log = "0.4"
# Concurrency
parking_lot = "0.12"
# Async
async-trait = "0.1"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
