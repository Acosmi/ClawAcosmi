[package]
name = "openviking-queue"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Async embedding queue and semantic processing for OpenViking"

[lib]
crate-type = ["rlib"]

[dependencies]
openviking-core = { path = "../openviking-core" }
openviking-session = { path = "../openviking-session" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
uuid = { version = "1", features = ["v4"] }
tokio = { version = "1", features = ["sync", "time", "rt"] }
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
