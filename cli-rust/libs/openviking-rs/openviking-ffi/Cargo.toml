[package]
name = "openviking-ffi"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "C-ABI foreign function interface for the OpenViking memory library"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
openviking-core = { path = "../openviking-core" }
openviking-session = { path = "../openviking-session" }
openviking-vector = { path = "../openviking-vector" }
openviking-vfs = { path = "../openviking-vfs" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiktoken-rs = "0.6"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tempfile = "3"
