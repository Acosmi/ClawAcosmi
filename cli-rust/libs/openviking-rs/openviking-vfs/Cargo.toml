[package]
name = "openviking-vfs"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "VikingFS — high-level file system abstraction for OpenViking memory"

[lib]
crate-type = ["rlib"]

[dependencies]
openviking-core = { path = "../openviking-core" }
openviking-session = { path = "../openviking-session" }
openviking-queue = { path = "../openviking-queue" }
openviking-transaction = { path = "../openviking-transaction" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
tokio = { version = "1", features = ["fs", "io-util"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "fs", "io-util"] }
tempfile = "3"
