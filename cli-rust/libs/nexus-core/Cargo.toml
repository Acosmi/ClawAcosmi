[workspace]
resolver = "2"
members = [
    "nexus-tokenizer",
    "nexus-vector",
    "nexus-crypto",
    "nexus-decay",
    "nexus-graph",
    "nexus-unified",
    "nexus-memfs",
]

[workspace.package]
edition = "2021"
license = "MIT"
authors = ["UHMS Team"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
