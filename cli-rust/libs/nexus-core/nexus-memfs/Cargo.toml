[package]
name = "nexus-memfs"
version = "0.1.0"
edition.workspace = true
description = "Virtual filesystem-based memory store for UHMS permanent memory (inspired by OpenViking)"

[lib]
crate-type = ["rlib"]

[dependencies]
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
