name: Argus-Compound CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

jobs:
  # ===================== Go: Lint + Build =====================
  go-check:
    name: Go Lint & Build
    runs-on: macos-latest # macOS needed for CoreGraphics/CGO
    defaults:
      run:
        working-directory: go-sensory
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build
        run: cd rust-core && cargo build --release

      - name: Rust clippy
        run: cd rust-core && cargo clippy -- -D warnings

      - name: Install Go dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Static check (if available)
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./... || true

      - name: Test
        run: |
          go test -v -count=1 -timeout 120s \
            ./internal/imaging/ \
            ./internal/pipeline/ \
            ./internal/ipc/ \
            ./internal/input/ || true

  # ===================== Web: TypeScript + Build =====================
  web-check:
    name: Web TypeScript & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-console
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web-console/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build

  # ===================== Docker Compose Validation =====================
  docker-check:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Check services start (dry run)
        run: docker compose config --services
