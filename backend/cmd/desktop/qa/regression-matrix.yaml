cases:
  - id: desktop.attach-existing-gateway
    priority: P1
    scenario: 固定端口上已有健康 Gateway 时，桌面壳应附着而不是重复拉起
    current_status: partially_covered
    existing_evidence:
      automated:
        - file: backend/cmd/desktop/runtime_test.go
          test: TestPrepareDesktopBootstrap_AttachesExistingGateway
        - file: backend/cmd/desktop/runtime_test.go
          test: TestResolveDesktopPort
      code_path:
        - file: backend/cmd/desktop/runtime.go
          symbol: prepareDesktopBootstrap
        - file: backend/cmd/desktop/runtime.go
          symbol: startOrAttachGateway
    remaining_gap:
      - 尚未做真实进程级附着验证
      - 尚未验证附着已有实例后不会误关闭对方 runtime
    planned_followup:
      - 后续增加真实 /health listener 的进程级集成验证

  - id: desktop.foreign-port-conflict
    priority: P1
    scenario: 固定端口被非 Gateway 进程占用时，桌面壳应明确失败
    current_status: uncovered
    existing_evidence:
      automated: []
      code_path:
        - file: backend/cmd/desktop/runtime.go
          symbol: startOrAttachGateway
    remaining_gap:
      - 当前没有专门的冲突端口回归用例
      - 尚未把“健康 Gateway”和“非 Gateway 占用”分成独立集成场景
    planned_followup:
      - 后续增加临时 HTTP/TCP listener 占端口的失败路径验证

