        - file: backend/internal/gateway/control_ui_test.go
          test: TestNewControlUIHandler_MissingAssetWithExtensionReturns404
        - file: backend/internal/gateway/control_ui_test.go
          test: TestNewControlUIHandler_CustomIndexAndPathCleaning
      code_path:
        - file: backend/internal/gateway/control_ui.go
          symbol: newControlUIHandler
        - file: backend/internal/gateway/server.go
          symbol: StartGatewayServer
    remaining_gap:
      - 已覆盖 handler 行为，但尚未覆盖桌面窗口层的实际刷新行为
    planned_followup:
      - 后续增加 localhost 集成验证和桌面窗口手工验收

