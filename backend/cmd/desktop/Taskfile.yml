version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml

vars:
  APP_NAME: "ClawAcosmi-desktop"
  PRODUCT_NAME: "ClawAcosmi"
  BIN_DIR: "bin"
  WAILS3_BIN: '{{.WAILS3_BIN | default "/Users/fushihua/go/bin/wails3"}}'

tasks:
  stage:ui:
    desc: Stage Control UI assets for desktop embed builds
    cmds:
      - task: common:stage:ui

  build:
    desc: Build the desktop host for the current platform
    cmds:
      - task: "{{OS}}:build"

  package:
    desc: Package the desktop host for the current platform
    cmds:
      - task: "{{OS}}:package"

  run:
    desc: Run the desktop host for the current platform
    cmds:
      - task: "{{OS}}:run"
