version: '3'

info:
  companyName: "Acosmi"
  productName: "ClawAcosmi"
  productIdentifier: "com.acosmi.clawacosmi.desktop"
  description: "ClawAcosmi desktop shell"
  copyright: "(c) 2026, Acosmi"
  comments: "Local desktop shell package"
  version: "0.0.0-dev"

dev_mode:
  root_path: ..
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true

other:
  - name: desktop
